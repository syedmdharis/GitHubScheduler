on:
  schedule:
    - cron: '0 0 * * *'  # Daily at midnight UTC
  workflow_dispatch:     # Optional: Enable manual run   
jobs:
  run-code:
    runs-on: ubuntu-latest
    env:
      MY_SECRET: ${{ secrets.PWD }}      # From secrets
      MY_VAR: ${{ vars.EID }}            # From variables
    steps:
      - name: Checkout code
        uses: actions/checkout@v4   
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Run script
        run: python example.py verify
